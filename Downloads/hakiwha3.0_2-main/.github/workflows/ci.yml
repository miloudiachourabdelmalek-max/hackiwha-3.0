name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: admind_test
          POSTGRES_USER: admind
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U admind" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
        working-directory: packages/server
      - run: npx prisma generate
        working-directory: packages/server
      - run: npx prisma migrate deploy
        working-directory: packages/server
        env:
          DATABASE_URL: postgresql://admind:test@localhost:5432/admind_test
      - run: npm test
        working-directory: packages/server
        env:
          DATABASE_URL: postgresql://admind:test@localhost:5432/admind_test

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/client/package-lock.json
      - run: npm ci
        working-directory: packages/client
      - run: npx react-scripts build
        working-directory: packages/client
        env:
          CI: false
